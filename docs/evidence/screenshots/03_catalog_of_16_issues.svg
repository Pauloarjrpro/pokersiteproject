<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="552" viewBox="0 0 2300 552">
  <rect x="0" y="0" width="2300" height="552" fill="#eef2ff"/>
  <rect x="8" y="8" width="2284" height="536" rx="10" ry="10" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="22" y="48" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#111827">Catalog of 16 Technical Issues - Code Evidence</text><text x="22" y="72" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827"></text><text x="22" y="96" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">1) isEmpty() validation fix in AuthController/GameController/TournamentController/MemberController</text><text x="22" y="120" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">2) AuthController: added fs/path imports + safe optional avatar handling in register</text><text x="22" y="144" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">3) MemberController.amount: fixed undefined token using user.token</text><text x="22" y="168" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">4) MemberController.setProfile: added fs/path imports + user/currentPassword checks</text><text x="22" y="192" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">5) MemberRouter: /getAmount now requires auth</text><text x="22" y="216" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">6) GameController.create/update/kick: owner/admin authorization and validation</text><text x="22" y="240" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">7) TournamentController.update/start/updateMember: owner/admin authorization</text><text x="22" y="264" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">8) TournamentController.joinGame: no client-trusted player_id + duplicate join prevention</text><text x="22" y="288" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">9) TournamentController/WebsocketController: findOne() corrected with where</text><text x="22" y="312" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">10) WebsocketController: kickUser now enforces roomId targeting</text><text x="22" y="336" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">11) WebsocketController: protected JSON parsing + bet amount validation</text><text x="22" y="360" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">12) WebsocketController: fixed random seat off-by-one</text><text x="22" y="384" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">13) GameRoom: removed unsafe Function.constructor execution</text><text x="22" y="408" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">14) GameRoom: fixed winnersArr variable used in tournament result broadcast</text><text x="22" y="432" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">15) Frontend axios API_ACCOUNT: ./api -&gt; /api</text><text x="22" y="456" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">16) Frontend token/routes/ws: JWTContext token, /account/wallet, get-tournament-list/createTournament</text><text x="22" y="480" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827"></text><text x="22" y="504" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="400" fill="#111827">References: docs/evidence/logs/02_issue_inventory.txt and docs/evidence/diffs/05_fixes_diff.diff</text>
</svg>